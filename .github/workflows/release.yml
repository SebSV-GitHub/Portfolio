name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      artifact:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          artifact: ${{ inputs.artifact }}
          generateReleaseNotes: true
